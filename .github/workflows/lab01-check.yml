name: FIT4012 Lab 1 Auto Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validate-lab01:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up g++
        run: |
          sudo apt-get update
          sudo apt-get install -y g++

      - name: Run Lab 01 checker
        run: python3 .github/scripts/check_lab01.py
